[variables]
NODE_VERSION = "20"

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "(node_modules/.bin/prisma db push --accept-data-loss --skip-generate || echo 'db push failed, server starting anyway') && (node prisma/seed-super-admin.js || echo 'seed skipped') && (node prisma/seed-local-data.js || echo 'local seed skipped') && npm start"
