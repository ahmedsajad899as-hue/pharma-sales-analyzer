[variables]
NODE_VERSION = "20"

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = ["node_modules/.bin/prisma generate", "npm run build"]

[start]
cmd = "(node_modules/.bin/prisma migrate deploy || node_modules/.bin/prisma db push --accept-data-loss || echo 'db sync failed, server starting anyway') && (node prisma/seed-super-admin.js || echo 'seed skipped') && npm start"
