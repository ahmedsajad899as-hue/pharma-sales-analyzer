<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    <title>فارما سيلز</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="/favicon.ico">
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('root').innerHTML =
        '<div style="padding:32px;color:#b91c1c;background:#fef2f2;font-size:16px;direction:ltr">' +
        '<h2>JavaScript Error</h2>' +
        '<pre>' + msg + '\n' + src + ':' + line + '\n' + (err && err.stack ? err.stack : '') + '</pre>' +
        '</div>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('root').innerHTML =
        '<div style="padding:32px;color:#b91c1c;background:#fef2f2;font-size:16px;direction:ltr">' +
        '<h2>Unhandled Promise Rejection</h2>' +
        '<pre>' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '</pre>' +
        '</div>';
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</head>
<body class="bg-gray-50">
    <div id="root">
      <div style="text-align:center;padding:40px;color:#64748b;font-size:20px;">جاري التحميل...</div>
    </div>
</body>
</html>
